<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>String Utils</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="layout">

  <header id="header">
    <h1>String <span>Utils</span></h1>
  </header>

  <div id="workspace">

    <nav id="sidebar">
      <div id="fn-list"></div>
      <div id="sidebar-run">
        <button id="btn-run">RUN (⌘↩)</button>
        <div id="undo-redo">
          <button id="btn-undo" disabled title="Undo (⌘Z)">Undo</button>
          <button id="btn-redo" disabled title="Redo (⌘⇧Z)">Redo</button>
        </div>
      </div>
    </nav>

    <main id="main">
      <div id="io-wrap">
        <textarea id="io" spellcheck="false" placeholder="Paste text here…"></textarea>
      </div>
      <div id="param-panel">
        <div id="param-inner"></div>
      </div>
    </main>

  </div>

  <footer id="statusbar">
    <span id="stat-line">Ln 1</span>
    <span class="sep">·</span>
    <span id="stat-total">0 lines</span>
    <span class="sep">·</span>
    <span id="stat-char"></span>
    <span id="stat-sel"></span>
    <span id="status-msg"></span>
  </footer>

</div>

<script src="js/params.js"></script>
<script src="js/functions.js"></script>
<script src="js/app.js"></script>
</body>
</html>
